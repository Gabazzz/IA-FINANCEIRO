<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient definition -->
    <linearGradient id="previoIconGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9B6C" />
      <stop offset="100%" stop-color="#00E09C" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="previoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0D1B2A" />

  <!-- Previo Icon Symbol -->
  <g filter="url(#previoGlow)">
    <!-- Top-Left Arc -->
    <path d="M 342 133 A 150 150 0 0 0 133 342" fill="none" stroke="url(#previoIconGrad)" stroke-width="36" stroke-linecap="round" />
    
    <!-- Bottom-Right Arc -->
    <path d="M 170 379 A 150 150 0 0 0 379 170" fill="none" stroke="url(#previoIconGrad)" stroke-width="36" stroke-linecap="round" />
    
    <!-- Diagonal Arrow -->
    <line x1="150" y1="362" x2="390" y2="122" stroke="url(#previoIconGrad)" stroke-width="36" stroke-linecap="round" />
    <path d="M 290 122 L 390 122 L 390 222" fill="none" stroke="url(#previoIconGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
