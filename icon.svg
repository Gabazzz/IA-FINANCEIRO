<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1729" />
      <stop offset="100%" stop-color="#070c18" />
    </radialGradient>
    
    <!-- Neon Emerald Glow -->
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Amber Glow -->
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8"/>

  <!-- Radar Grid System -->
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1e293b" stroke-width="3" stroke-dasharray="10 8" />
  
  <!-- Middle Ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="5 5" />
  
  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#475569" stroke-width="1.5" />

  <!-- Radar Crosshairs -->
  <line x1="256" y1="40" x2="256" y2="472" stroke="#1e293b" stroke-width="2" stroke-dasharray="8 6" />
  <line x1="40" y1="256" x2="472" y2="256" stroke="#1e293b" stroke-width="2" stroke-dasharray="8 6" />
  
  <!-- Diagonal Crosshairs -->
  <line x1="103" y1="103" x2="409" y2="409" stroke="#0f1729" stroke-width="1.5" stroke-dasharray="4 4" />
  <line x1="103" y1="409" x2="409" y2="103" stroke="#0f1729" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Radar Sweep Hand (Emerald Glowing Segment) -->
  <path d="M 256 256 L 390 122 A 190 190 0 0 0 256 66 Z" fill="#10d98c" fill-opacity="0.12" filter="url(#glowEmerald)" />
  <line x1="256" y1="256" x2="390" y2="122" stroke="#10d98c" stroke-width="4" filter="url(#glowEmerald)" stroke-linecap="round" />

  <!-- Outer Indicator Blips -->
  <circle cx="390" cy="122" r="6" fill="#10d98c" filter="url(#glowEmerald)" />
  <circle cx="160" cy="320" r="5" fill="#f59e0b" filter="url(#glowAmber)" />
  <circle cx="280" cy="380" r="4" fill="#ef4444" opacity="0.8" />

  <!-- Central Core (Dashboard Eye) -->
  <circle cx="256" cy="256" r="16" fill="#070c18" stroke="#10d98c" stroke-width="4" filter="url(#glowEmerald)" />
  <circle cx="256" cy="256" r="5" fill="#10d98c" />
</svg>
